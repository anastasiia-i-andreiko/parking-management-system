<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Керування парковкою</title>
    <link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Парковка 24/7</h1>

        <div class="input-group">
            <input type="text" id="plate" placeholder="Введіть номер авто">
            <select id="type">
                <option value="car">Легкове</option>
                <option value="truck">Вантажівка</option>
            </select>
            <button onclick="sendData()">ДОДАТИ АВТО</button>
        </div>

        <table id="carsTable">
            <thead>
                <tr>
                    <th>НОМЕР</th>
                    <th>ТИП</th>
                    <th>СТАТУС</th>
                    <th>ДІЯ</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
